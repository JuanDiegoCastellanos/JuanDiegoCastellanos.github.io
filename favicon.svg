<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="bolt-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="brain-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#030308"/>

  <!-- Brain fill (subtle) -->
  <path d="M16 6.5
           C19.5 6.5 23.5 8.5 25.5 11.5
           C27 13.5 27 16.5 25.5 19
           C24 21.5 21.5 23.5 18.5 24.5
           L16 25.5
           L13.5 24.5
           C10.5 23.5 8 21.5 6.5 19
           C5 16.5 5 13.5 6.5 11.5
           C8.5 8.5 12.5 6.5 16 6.5Z"
        fill="rgba(0,220,220,0.07)"/>

  <!-- Brain outer stroke -->
  <path d="M16 6.5
           C19.5 6.5 23.5 8.5 25.5 11.5
           C27 13.5 27 16.5 25.5 19
           C24 21.5 21.5 23.5 18.5 24.5
           L16 25.5
           L13.5 24.5
           C10.5 23.5 8 21.5 6.5 19
           C5 16.5 5 13.5 6.5 11.5
           C8.5 8.5 12.5 6.5 16 6.5Z"
        fill="none" stroke="#00DDDD" stroke-width="1.3" filter="url(#brain-glow)"/>

  <!-- Center groove (dark) -->
  <path d="M16 7 C14.8 9.5 14.8 12 16 14.5 C17.2 17 17.2 19.5 16 22 C15 23.5 15 24.5 16 25.5"
        fill="none" stroke="#030308" stroke-width="2.8"/>
  <!-- Center groove (cyan line) -->
  <path d="M16 7 C14.8 9.5 14.8 12 16 14.5 C17.2 17 17.2 19.5 16 22 C15 23.5 15 24.5 16 25.5"
        fill="none" stroke="#009999" stroke-width="0.9" opacity="0.7"/>

  <!-- Left lobe fold hints -->
  <path d="M8.5 11.5 Q10.5 10 10 14" fill="none" stroke="#00BBBB" stroke-width="1" opacity="0.55" stroke-linecap="round"/>
  <path d="M7 16 Q9 15 8.5 19" fill="none" stroke="#00BBBB" stroke-width="1" opacity="0.4" stroke-linecap="round"/>

  <!-- Right lobe fold hints -->
  <path d="M23.5 11.5 Q21.5 10 22 14" fill="none" stroke="#00BBBB" stroke-width="1" opacity="0.55" stroke-linecap="round"/>
  <path d="M25 16 Q23 15 23.5 19" fill="none" stroke="#00BBBB" stroke-width="1" opacity="0.4" stroke-linecap="round"/>

  <!-- Lightning bolt glow layer -->
  <path d="M19 8.5 L14 17 L17.5 17 L13.5 23.5 L21 15 L17.5 15 Z"
        fill="rgba(255,92,0,0.35)" stroke="rgba(255,92,0,0.25)" stroke-width="3.5"
        stroke-linejoin="round" filter="url(#bolt-glow)"/>

  <!-- Lightning bolt solid -->
  <path d="M19 8.5 L14 17 L17.5 17 L13.5 23.5 L21 15 L17.5 15 Z"
        fill="#FF5C00" filter="url(#bolt-glow)"/>
</svg>
